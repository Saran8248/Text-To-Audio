services:
  - type: web
    name: text-to-audio-backend
    env: docker
    plan: starter
    branch: main
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
      - key: PYTHON_EXECUTABLE
        value: "/usr/src/app/venv/bin/python"
