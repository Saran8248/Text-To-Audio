services:
  - type: web
    name: text-to-audio-backend
    env: docker
    plan: starter
    branch: main
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
      - key: PYTHON_EXECUTABLE
        value: "/usr/src/app/venv/bin/python"
      - key: DEFAULT_ADMIN_EMAIL
        value: "sksaran987@gmail.com"
      - key: DEFAULT_ADMIN_PASSWORD
        value: "Sarankd@987"
      - key: REQUIRE_ADMIN_APPROVAL
        value: "true"
