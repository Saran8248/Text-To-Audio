services:
  - type: web
    name: text-to-audio-backend
    env: node
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
      - key: PYTHON_EXECUTABLE
        value: "/usr/bin/python3"
